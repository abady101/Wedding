<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف عبدالرحمن</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:420px;
background:#181818;
border:2px solid #d4af37;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 30px rgba(212,175,55,.3);
}

h1{
color:#d4af37;
margin:0;
}

.name{
font-size:36px;
margin:20px 0;
font-weight:bold;
}

.info{
margin:12px 0;
font-size:18px;
}

.btn{
display:block;
margin-top:25px;
padding:15px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

.footer{
margin-top:25px;
font-size:14px;
opacity:.7;
}
</style>

</head>

<body>

<div class="card">

<h1>دعوة زفاف</h1>

<div class="name">
عبدالرحمن
</div>

<div class="info">
📅 الأربعاء<br>
02 سبتمبر 2026
</div>

<div class="info">
🕗 الساعة 8:00 مساءً
</div>

<div class="info">
📍 قاعة القصر للاحتفالات
</div>

<a class="btn" href="https://maps.app.goo.gl/V5e1w5yeiwWsbQ4X9?g_st=ic">
فتح موقع القاعة
</a>

<div class="footer">
نتشرف بحضوركم ومشاركتكم فرحتنا 🤍
</div>

</div>

</body>
</html>
